name: Build OpenWrt IPK for wstunnel (aarch64)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download OpenWrt SDK (aarch64)
      run: |
        SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/rockchip/armv8/openwrt-sdk-23.05.5-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
        wget -O sdk.tar.xz $SDK_URL
        mkdir sdk
        tar -xJf sdk.tar.xz -C sdk --strip-components=1

    - name: Link package to SDK
      run: |
        # 创建软链接，让 SDK 的 package 目录指向你的工作空间
        ln -sf $GITHUB_WORKSPACE sdk/package/wstunnel
        echo "=== Package linked successfully ==="
        ls -la sdk/package/
        ls -la sdk/package/wstunnel/

    - name: Update feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Build package
      env:
        TERM: linux
      run: |
        cd sdk
        # 生成默认配置
        make defconfig
        # 编译软件包
        make package/wstunnel/compile V=99

    - name: Upload IPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wstunnel-aarch64
        path: sdk/bin/packages/*/*/wstunnel*.ipk
        if-no-files-found: error