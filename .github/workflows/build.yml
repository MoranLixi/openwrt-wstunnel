name: Build OpenWrt IPK for wstunnel (aarch64)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean workspace
      run: |
        # 删除可能引起循环的旧 SDK 目录
        rm -rf sdk

    - name: Download OpenWrt SDK
      run: |
        SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/sunxi/cortexa53/openwrt-sdk-23.05.5-sunxi-cortexa53_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
        wget -O sdk.tar.xz $SDK_URL
        mkdir sdk
        tar -xJf sdk.tar.xz -C sdk --strip-components=1    

    - name: Copy package to SDK
      run: |
        # 直接复制，不使用软链接，且不复制 .git 目录
        mkdir -p sdk/package/wstunnel
        # 只复制必要的文件：Makefile 和 files 目录
        cp -r $GITHUB_WORKSPACE/Makefile sdk/package/wstunnel/
        cp -r $GITHUB_WORKSPACE/files sdk/package/wstunnel/ 2>/dev/null || true
        # 如果有 LICENSE 也复制
        cp -r $GITHUB_WORKSPACE/LICENSE sdk/package/wstunnel/ 2>/dev/null || true
        
        echo "=== Package contents ==="
        ls -la sdk/package/wstunnel/

    - name: Update feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Build package
      env:
        TERM: linux
      run: |
        cd sdk
        make defconfig
        make package/wstunnel/compile V=99

    - name: Upload IPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wstunnel-aarch64
        path: sdk/bin/packages/*/*/wstunnel*.ipk
        if-no-files-found: error

  # 新增的发布任务
  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download IPK artifact
        uses: actions/download-artifact@v4
        with:
          name: wstunnel-aarch64
          path: ./ipk-files
      - name: Create Release and Upload IPK
        uses: softprops/action-gh-release@v1
        with:
          name: "wstunnel OpenWrt 包 ${{ github.ref_name || 'Latest Build' }}"
          files: ./ipk-files/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}