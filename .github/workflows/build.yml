name: Build OpenWrt IPK for wstunnel (aarch64)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download OpenWrt SDK (aarch64)
      run: |
        SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/rockchip/armv8/openwrt-sdk-23.05.5-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
        wget -O sdk.tar.xz $SDK_URL
        mkdir sdk
        tar -xJf sdk.tar.xz -C sdk --strip-components=1

    - name: Link package to SDK feeds
      run: |
        # 将你的包目录链接到 SDK 的 package/feeds 目录下
        mkdir -p sdk/package/feeds
        ln -sf $GITHUB_WORKSPACE sdk/package/feeds/wstunnel
        
        # 创建一个 feeds 配置文件，告诉系统有一个名为 wstunnel 的本地 feed
        echo "src-link wstunnel $GITHUB_WORKSPACE" >> sdk/feeds.conf.default

    - name: Update and install feeds
      run: |
        cd sdk
        # 更新 feeds（现在你的包会被检测到）
        ./scripts/feeds update -a
        # 关键：安装 wstunnel 这个 feed
        ./scripts/feeds install wstunnel

    - name: Build package
      env:
        TERM: linux
      run: |
        cd sdk
        make defconfig
        # 现在应该能找到这个包了
        make package/feeds/wstunnel/compile V=99

    - name: Upload IPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wstunnel-aarch64
        path: sdk/bin/packages/*/*/wstunnel*.ipk
        if-no-files-found: error