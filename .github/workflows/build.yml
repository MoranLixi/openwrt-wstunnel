name: Build OpenWrt IPK for wstunnel (aarch64)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download OpenWrt SDK
      run: |
        SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/rockchip/armv8/openwrt-sdk-23.05.5-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
        wget -O sdk.tar.xz $SDK_URL
        mkdir sdk
        tar -xJf sdk.tar.xz -C sdk --strip-components=1

    - name: Copy package to SDK
      run: |
        # 创建目标目录
        mkdir -p sdk/package/wstunnel
        
        # 复制工作空间中的包文件（排除 sdk 目录和 .git 目录）
        # 使用 rsync 的 --exclude 选项来排除不需要的目录
        sudo apt-get update && sudo apt-get install -y rsync
        rsync -av --exclude='sdk' --exclude='.git' $GITHUB_WORKSPACE/ sdk/package/wstunnel/
        
        echo "=== Package copied successfully ==="
        ls -la sdk/package/wstunnel/
        ls -la sdk/package/wstunnel/Makefile || echo "Makefile not found!"

    - name: Update feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Build package
      env:
        TERM: linux
      run: |
        cd sdk
        # 使用默认配置
        make defconfig
        # 直接编译
        make package/wstunnel/compile V=99

    - name: Upload IPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wstunnel-aarch64
        path: sdk/bin/packages/*/*/wstunnel*.ipk
        if-no-files-found: error