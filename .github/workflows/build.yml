name: Build OpenWrt IPK for wstunnel (aarch64)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download OpenWrt SDK (aarch64)
      run: |
        SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/rockchip/armv8/openwrt-sdk-23.05.5-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
        wget -O sdk.tar.xz $SDK_URL
        mkdir sdk
        tar -xJf sdk.tar.xz -C sdk --strip-components=1

    - name: Copy package to SDK
      run: |
        mkdir -p sdk/package/wstunnel
        # 复制所有文件到 SDK 包目录
        cp -r $GITHUB_WORKSPACE/* sdk/package/wstunnel/
        # 复制隐藏文件（如果有）
        cp -r $GITHUB_WORKSPACE/.[!.]* sdk/package/wstunnel/ 2>/dev/null || true

    - name: Update feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Build package
      run: |
        cd sdk
        make package/wstunnel/compile V=99

    - name: Upload IPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wstunnel-aarch64
        path: sdk/bin/packages/*/*/wstunnel*.ipk
        if-no-files-found: error